<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Score Predictor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 420px;
        }
        h1 { text-align: center; color: #333; margin-bottom: 8px; font-size: 24px; }
        p.subtitle { text-align: center; color: #888; margin-bottom: 30px; font-size: 14px; }
        label { display: block; color: #555; font-size: 14px; margin-bottom: 6px; font-weight: 600; }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 15px;
            margin-bottom: 18px;
            transition: border 0.3s;
        }
        input:focus { outline: none; border-color: #667eea; }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { opacity: 0.9; }
        .result {
            margin-top: 24px;
            text-align: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 20px;
            border-radius: 12px;
            color: white;
        }
        .result h2 { font-size: 18px; margin-bottom: 8px; }
        .result .score { font-size: 48px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🧠 Score Predictor</h1>
        <p class="subtitle">Powered by Neural Network</p>
        <form action="/predict" method="POST">
            <label>Study Hours (1-10)</label>
            <input type="number" name="study_hours" step="0.1" min="1" max="10" placeholder="e.g. 7.5" required>
            <label>Sleep Hours (4-10)</label>
            <input type="number" name="sleep_hours" step="0.1" min="4" max="10" placeholder="e.g. 8.0" required>
            <label>Attendance (%)</label>
            <input type="number" name="attendance" step="0.1" min="50" max="100" placeholder="e.g. 90" required>
            <label>Previous Score (40-100)</label>
            <input type="number" name="prev_score" step="0.1" min="40" max="100" placeholder="e.g. 85" required>
            <button type="submit">Predict Score 🎯</button>
        </form>
        {% if prediction %}
        <div class="result">
            <h2>Predicted Exam Score</h2>
            <div class="score">{{ prediction }}</div>
        </div>
        {% endif %}
    </div>
</body>
</html>
